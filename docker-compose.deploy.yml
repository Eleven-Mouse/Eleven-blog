services:
  mysql_db:
    image: mysql:8.0
    container_name: blog-mysql
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      TZ: Asia/Shanghai
    volumes:
      - /root/blog/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - blog-net

  redis:
    image: redis:alpine
    container_name: blog-redis
    restart: always
    command: redis-server --requirepass "${REDIS_PASSWORD}"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - blog-net

  blog-backend:
    image: kunxingll/blog-backend:latest
    container_name: blog-backend
    restart: always
    env_file:
      - .env
    depends_on:
      mysql_db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /root/blog/upload_data:/app/uploads
    environment:
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - SPRING_DATA_REDIS_HOST=${SPRING_DATA_REDIS_HOST}
      - SPRING_DATA_REDIS_PORT=${SPRING_DATA_REDIS_PORT}
      - SPRING_DATA_REDIS_PASSWORD=${SPRING_DATA_REDIS_PASSWORD}
      - SPRING_DATA_REDIS_DATABASE=${SPRING_DATA_REDIS_DATABASE}
      - FILE_UPLOAD_DIR=${FILE_UPLOAD_DIR}
      - GITHUB_OAUTH_CLIENT_ID=${GITHUB_OAUTH_CLIENT_ID}
      - GITHUB_OAUTH_CLIENT_SECRET=${GITHUB_OAUTH_CLIENT_SECRET}
      - GITHUB_OAUTH_REDIRECT_URI=${GITHUB_OAUTH_REDIRECT_URI}
      - JWT_SECRET=${JWT_SECRET}
      - BLOG_OWNER_EMAIL=${BLOG_OWNER_EMAIL}
      - BLOG_OWNER_NICKNAME=${BLOG_OWNER_NICKNAME}
      - BLOG_OWNER_GITHUB_ID=${BLOG_OWNER_GITHUB_ID}
      - SPRING_MAIL_HOST=${MAIL_HOST}
      - SPRING_MAIL_PORT=${MAIL_PORT}
      - SPRING_MAIL_USERNAME=${MAIL_USERNAME}
      - SPRING_MAIL_PASSWORD=${MAIL_PASSWORD}
      # 生产环境关闭调试日志
      - LOGGING_LEVEL_BLOG_MAPPER=warn
      - LOGGING_LEVEL_BLOG_SERVICE=info
      - LOGGING_LEVEL_BLOG_CONTROLLER=info
      - LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY=warn
      - LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB=warn
    networks:
      - blog-net
    # 生产环境不对外暴露端口，通过 nginx 代理访问

  blog-view:
    image: kunxingll/blog-view:latest
    container_name: blog-view
    restart: always
    ports:
      - "80:80"
    depends_on:
      - blog-backend
    networks:
      - blog-net

  blog-cms:
    image: kunxingll/blog-cms:latest
    container_name: blog-cms
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - blog-backend
    networks:
      - blog-net

volumes:
  db_data:
  redis_data:

networks:
  blog-net:
    driver: bridge
