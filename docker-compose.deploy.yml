services:
  mysql_db:
    image: mysql:8.0
    container_name: blog-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 20469960
      MYSQL_DATABASE: eleven_blog
      TZ: Asia/Shanghai
    volumes:
      - db_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p20469960"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - blog-net

  blog-backend:
    image: kunxingll/blog-backend:latest
    container_name: blog-backend
    restart: always
    env_file:
      - .env
    volumes:
      - /root/blog/upload_data:/app/uploads
    environment:
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - SPRING_DATA_REDIS_HOST=${SPRING_DATA_REDIS_HOST}
      - SPRING_DATA_REDIS_PORT=${SPRING_DATA_REDIS_PORT}
      - SPRING_DATA_REDIS_PASSWORD=${SPRING_DATA_REDIS_PASSWORD}
      - SPRING_DATA_REDIS_DATABASE=${SPRING_DATA_REDIS_DATABASE}
      - FILE_UPLOAD_DIR=${FILE_UPLOAD_DIR}
      - GITHUB_OAUTH_CLIENT_ID=${GITHUB_OAUTH_CLIENT_ID}
      - GITHUB_OAUTH_CLIENT_SECRET=${GITHUB_OAUTH_CLIENT_SECRET}
      - GITHUB_OAUTH_REDIRECT_URI=${GITHUB_OAUTH_REDIRECT_URI}
      - JWT_SECRET=${JWT_SECRET}
      - BLOG_OWNER_EMAIL=${BLOG_OWNER_EMAIL}
      - BLOG_OWNER_NICKNAME=${BLOG_OWNER_NICKNAME}
      - BLOG_OWNER_GITHUB_ID=${BLOG_OWNER_GITHUB_ID}
      - SPRING_MAIL_HOST=${MAIL_HOST}
      - SPRING_MAIL_PORT=${MAIL_PORT}
      - SPRING_MAIL_USERNAME=${MAIL_USERNAME}
      - SPRING_MAIL_PASSWORD=${MAIL_PASSWORD}
      # 生产环境日志级别
      - LOGGING_LEVEL_BLOG_MAPPER=warn
      - LOGGING_LEVEL_BLOG_SERVICE=info
      - LOGGING_LEVEL_BLOG_CONTROLLER=info
      - LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY=warn
      - LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB=warn
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8081/images/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 768M
    depends_on:
      mysql_db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - blog-net

  blog-view:
    image: kunxingll/blog-view:latest
    container_name: blog-view
    restart: always
    ports:
      - "80:80"
    depends_on:
      blog-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 3s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - blog-net

  blog-cms:
    image: kunxingll/blog-cms:latest
    container_name: blog-cms
    restart: always
    ports:
      - "8082:8080"
    depends_on:
      blog-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080"]
      interval: 30s
      timeout: 3s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - blog-net

volumes:
  db_data:

networks:
  blog-net:
    driver: bridge
