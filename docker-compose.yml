services:
  # --- 1. MySQL 服务 ---
  mysql_db:
    image: mysql:8.0
    container_name: blog-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 20469960
      MYSQL_DATABASE: eleven_blog
      TZ: Asia/Shanghai
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p20469960"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - blog-net

  # --- 2. Redis 服务 ---
  redis:
    image: redis:alpine
    container_name: blog-redis
    restart: always
    command: redis-server --requirepass "123456"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "123456", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - blog-net

  # --- 3. 后端服务 ---
  blog-backend:
    build: ./blog-backend
    container_name: blog-backend
    restart: always
    ports:
      - "8081:8081"
    depends_on:
      mysql_db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./upload_data:/app/uploads
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://blog-mysql:3306/eleven_blog?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=20469960
      - SPRING_DATA_REDIS_HOST=blog-redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_PASSWORD=123456
      - SPRING_DATA_REDIS_DATABASE=1
      - FILE_UPLOAD_DIR=/app/uploads
      - SERVER_PORT=8081
    healthcheck:
      test: ["CMD-SHELL", "wget --timeout=2 -q -O /dev/null http://localhost:8081/ 2>&1 | grep -qi 'refused' && exit 1 || exit 0"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - blog-net

  # --- 4. 前端 (博客前台) ---
  blog-view:
    build: ./blog-view
    container_name: blog-view
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      blog-backend:
        condition: service_healthy
    networks:
      - blog-net

  # --- 5. 前端 (后台管理) ---
  blog-cms:
    build: ./blog-cms
    container_name: blog-cms
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      blog-backend:
        condition: service_healthy
    networks:
      - blog-net

volumes:
  db_data:
  redis_data:

networks:
  blog-net:
    driver: bridge
