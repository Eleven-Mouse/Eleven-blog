version: "3.9"
services:
  mysql:
    image: mysql:8.0
    container_name: blog-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      TZ: Asia/Shanghai
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s
    networks:
      - kunxing-net

  redis:
    image: redis:7-alpine
    container_name: blog-redis
    restart: always
    command: redis-server --requirepass "${REDIS_PASSWORD}" --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - kunxing-net

  blog-backend:
    image: kunxingll/blog-backend:latest
    container_name: kunxing-blog-backend
    restart: always
    env_file:
      - .env.backend
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: "${MYSQL_USERNAME:-root}"
      SPRING_DATASOURCE_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      SPRING_DATA_REDIS_HOST: "redis"
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_DATA_REDIS_PASSWORD: "${REDIS_PASSWORD}"
      SPRING_DATA_REDIS_DATABASE: "1"
      FILE_UPLOAD_DIR: "/app/uploads"
      TZ: "Asia/Shanghai"
    volumes:
      - ${UPLOAD_HOST_DIR:-./upload_data}:/app/uploads
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - kunxing-net
volumes:
  mysql_data:
  redis_data:

networks:
  kunxing-net:
    driver: bridge
