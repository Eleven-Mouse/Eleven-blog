# Spring Boot应用配置文件
# 敏感信息通过环境变量注入，开发环境使用下方默认值
spring:
    datasource:
        url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/eleven_blog?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useOldAliasMetadataBehavior=true&zeroDateTimeBehavior=convertToNull&autoCommit=true&rewriteBatchedStatements=true}
        username: ${SPRING_DATASOURCE_USERNAME:root}
        password: ${SPRING_DATASOURCE_PASSWORD:123456}
        driver-class-name: com.mysql.cj.jdbc.Driver
    servlet:
        multipart:
            max-file-size: 10MB
            max-request-size: 50MB
    data:
        redis:
            host: ${SPRING_DATA_REDIS_HOST:localhost}
            password: ${SPRING_DATA_REDIS_PASSWORD:123456}
            port: ${SPRING_DATA_REDIS_PORT:6379}
            database: ${SPRING_DATA_REDIS_DATABASE:1}
            connect-timeout: 10000ms
    sql:
        init:
            mode: never
            continue-on-error: false
    mail:
        host: ${SPRING_MAIL_HOST:smtp.qq.com}
        port: ${SPRING_MAIL_PORT:587}
        username: ${SPRING_MAIL_USERNAME:}
        password: ${SPRING_MAIL_PASSWORD:}
        properties:
            mail.smtp.auth: true
            mail.smtp.starttls.enable: true

jwt:
    secret: ${JWT_SECRET:dev-only-secret-key-please-replace-in-production-12345}
    access-token-expiration: 7200000
    refresh-token-expiration: 604800000

server:
    port: 8081
    address: 0.0.0.0

mybatis:
    mapper-locations: classpath:mapper/*.xml
    type-aliases-package: blog.pojo
    configuration:
        map-underscore-to-camel-case: true
        log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
    level:
        blog:
            mapper: ${LOGGING_LEVEL_BLOG_MAPPER:debug}
            service: ${LOGGING_LEVEL_BLOG_SERVICE:info}
            controller: ${LOGGING_LEVEL_BLOG_CONTROLLER:info}
        org.springframework.security: ${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY:debug}
        org.springframework.web: ${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB:debug}

file:
    upload-dir: ${FILE_UPLOAD_DIR:E:/blog-writing}
    upload-path: /images/**

management:
    endpoints:
        web:
            exposure:
                include: health,info
    endpoint:
        health:
            show-details: when-authorized
    health:
        db:
            enabled: true

blog:
    owner:
        email: ${BLOG_OWNER_EMAIL:}
        nickname: ${BLOG_OWNER_NICKNAME:博主}
        avatar: ${BLOG_OWNER_AVATAR:static/images/Image_1761740285982.jpg}
        github-id: ${BLOG_OWNER_GITHUB_ID:0}

github:
    oauth:
        client-id: ${GITHUB_OAUTH_CLIENT_ID:}
        client-secret: ${GITHUB_OAUTH_CLIENT_SECRET:}
        redirect-uri: ${GITHUB_OAUTH_REDIRECT_URI:http://localhost:3000/oauth/callback}
