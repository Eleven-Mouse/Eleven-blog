spring:
  datasource:
    url: jdbc:h2:mem:blog_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  data:
    redis:
      host: localhost
      port: 6379
      database: 1
      timeout: 1s
  task:
    scheduling:
      enabled: false
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-test.sql

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: blog.pojo
  configuration:
    map-underscore-to-camel-case: true

file:
  upload-dir: ${java.io.tmpdir}/eleven-blog-test

logging:
  level:
    root: warn

